name: Build & Release Windows .exe

# Déclenche un build à chaque tag `v*` (ex: v1.0.0).
# Permet aussi un build manuel depuis l'onglet Actions.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour créer la Release et y attacher l'exe

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81"
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      - name: Verify build output
        run: |
          dir dist
          if (-Not (Test-Path "dist\NathanCodeList.exe")) {
            Write-Error "Build failed: NathanCodeList.exe introuvable"
            exit 1
          }

      - name: Upload artifact (build manuel)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NathanCodeList-${{ github.sha }}
          path: dist/NathanCodeList.exe

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NathanCodeList.exe
          generate_release_notes: true
          draft: false
          prerelease: false
