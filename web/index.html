<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nathan Code List · Centre de commandement</title>

    <!-- Design system -->
    <link rel="stylesheet" href="style.css" />

    <!-- React + ReactDOM (UMD) - locaux pour offline-first -->
    <script crossorigin src="vendor/react.production.min.js"></script>
    <script crossorigin src="vendor/react-dom.production.min.js"></script>

    <!-- Recharts (UMD) - dépend de prop-types -->
    <script crossorigin src="vendor/prop-types.min.js"></script>
    <script crossorigin src="vendor/Recharts.js"></script>

    <!-- Babel Standalone : transpile les .jsx directement dans le navigateur -->
    <script src="vendor/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Ordre important : composants enfants avant App.jsx -->
    <script type="text/babel" data-presets="react" src="src/components/PomodoroTimer.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/components/ToDoList.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/components/Analytics.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/components/ProjectMatrix.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/components/Calendar.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/App.jsx"></script>
</body>
</html>
